<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0720"/>
      <stop offset="100%" stop-color="#141038"/>
    </linearGradient>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E149C"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="signal-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCA311"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="glow-brand">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-signal">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#F0EEFF">
    <line x1="0" y1="80" x2="1200" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke-width="0.5"/>
  </g>

  <!-- Animated orb - brand -->
  <circle cx="900" cy="180" r="120" fill="#3E149C" opacity="0.15" filter="url(#glow-brand)">
    <animate attributeName="cx" values="900;920;900" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;160;180" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="r" values="120;140;120" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated orb - secondary -->
  <circle cx="1050" cy="280" r="80" fill="#7C3AED" opacity="0.1" filter="url(#glow-brand)">
    <animate attributeName="cx" values="1050;1030;1050" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="280;300;280" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- Signal accent dot -->
  <circle cx="150" cy="100" r="4" fill="#FCA311" opacity="0.8" filter="url(#glow-signal)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="60" r="3" fill="#FCA311" opacity="0.6" filter="url(#glow-signal)">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Data chart line (stylized) -->
  <polyline points="60,300 120,280 180,290 240,250 300,260 360,220 420,230 480,190 540,200 600,170 660,180 700,150"
    stroke="url(#brand-grad)" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="5s" repeatCount="indefinite"/>
  </polyline>
  <!-- Chart dots -->
  <circle cx="700" cy="150" r="4" fill="#8B6CD4" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Ticker data flowing -->
  <g opacity="0.12" fill="#F0EEFF" font-family="monospace" font-size="11">
    <text x="750" y="330">MSE:TOP20</text>
    <text x="750" y="350" fill="#34D399">+2.34%</text>
    <text x="900" y="330">MNT/USD</text>
    <text x="900" y="350" fill="#F87171">-0.12%</text>
    <text x="1050" y="330">VOL</text>
    <text x="1050" y="350">1.2B</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,0;0,0" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- Title -->
  <text x="60" y="160" fill="#F0EEFF" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" letter-spacing="-2">
    Market IQ
  </text>
  <text x="60" y="200" fill="#A9A4C4" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18">
    Capital Markets Mongolia Intelligence Platform
  </text>

  <!-- Brand bar -->
  <rect x="60" y="220" width="60" height="3" rx="1.5" fill="url(#signal-grad)">
    <animate attributeName="width" values="60;80;60" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Tags -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">
    <rect x="60" y="245" width="70" height="24" rx="4" fill="rgba(62,20,156,0.3)" stroke="#3E149C" stroke-width="0.5"/>
    <text x="95" y="261" fill="#8B6CD4" text-anchor="middle">Next.js</text>

    <rect x="140" y="245" width="90" height="24" rx="4" fill="rgba(62,20,156,0.3)" stroke="#3E149C" stroke-width="0.5"/>
    <text x="185" y="261" fill="#8B6CD4" text-anchor="middle">TypeScript</text>

    <rect x="240" y="245" width="80" height="24" rx="4" fill="rgba(62,20,156,0.3)" stroke="#3E149C" stroke-width="0.5"/>
    <text x="280" y="261" fill="#8B6CD4" text-anchor="middle">Tailwind</text>

    <rect x="330" y="245" width="82" height="24" rx="4" fill="rgba(62,20,156,0.3)" stroke="#3E149C" stroke-width="0.5"/>
    <text x="371" y="261" fill="#8B6CD4" text-anchor="middle">Payload</text>
  </g>

  <!-- 910studio credit -->
  <text x="60" y="370" fill="#44415A" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="12" letter-spacing="0.5">
    Designed &amp; engineered by 910studio
  </text>
</svg>
