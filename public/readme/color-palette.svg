<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" fill="none">
  <defs>
    <linearGradient id="pal-bg" x1="0" y1="0" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0720"/>
      <stop offset="100%" stop-color="#0F0B2C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="200" fill="url(#pal-bg)" rx="12"/>

  <!-- Section label -->
  <text x="40" y="36" fill="#A9A4C4" font-family="system-ui, sans-serif" font-weight="600" font-size="11" letter-spacing="1.5" text-transform="uppercase">COLOR SYSTEM</text>

  <!-- Brand -->
  <rect x="40" y="56" width="100" height="100" rx="12" fill="#3E149C"/>
  <text x="90" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Brand</text>
  <text x="90" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#3E149C</text>

  <!-- Brand Hover -->
  <rect x="155" y="56" width="100" height="100" rx="12" fill="#2E0F75"/>
  <text x="205" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Hover</text>
  <text x="205" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#2E0F75</text>

  <!-- Brand Light -->
  <rect x="270" y="56" width="100" height="100" rx="12" fill="#7C3AED"/>
  <text x="320" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Accent</text>
  <text x="320" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#7C3AED</text>

  <!-- Signal -->
  <rect x="405" y="56" width="100" height="100" rx="12" fill="#FCA311"/>
  <text x="455" y="108" fill="#0C0A1D" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Signal</text>
  <text x="455" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#FCA311</text>

  <!-- Positive -->
  <rect x="520" y="56" width="100" height="100" rx="12" fill="#059669"/>
  <text x="570" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Positive</text>
  <text x="570" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#059669</text>

  <!-- Negative -->
  <rect x="635" y="56" width="100" height="100" rx="12" fill="#DC2626"/>
  <text x="685" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Negative</text>
  <text x="685" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#DC2626</text>

  <!-- Info -->
  <rect x="750" y="56" width="100" height="100" rx="12" fill="#0891B2"/>
  <text x="800" y="108" fill="#FFFFFF" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Info</text>
  <text x="800" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#0891B2</text>

  <!-- Surface light -->
  <rect x="885" y="56" width="100" height="100" rx="12" fill="#FAFAFD" stroke="#DDDBE8" stroke-width="1"/>
  <text x="935" y="108" fill="#0C0A1D" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Canvas</text>
  <text x="935" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#FAFAFD</text>

  <!-- Surface -->
  <rect x="1000" y="56" width="100" height="100" rx="12" fill="#F0EEF7" stroke="#DDDBE8" stroke-width="1"/>
  <text x="1050" y="108" fill="#0C0A1D" font-family="system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle">Surface</text>
  <text x="1050" y="180" fill="#A9A4C4" font-family="monospace" font-size="11" text-anchor="middle">#F0EEF7</text>

  <!-- Animated scan line -->
  <rect x="0" y="56" width="1200" height="1" fill="#3E149C" opacity="0.15">
    <animate attributeName="y" values="56;156;56" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="6s" repeatCount="indefinite"/>
  </rect>
</svg>
